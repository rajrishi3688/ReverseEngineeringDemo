openapi: 3.0.3
info:
  title: Quote Generation API
  version: 1.0.0
  description: >
    OpenAPI specification for the target quote-generation sample. The current
    target implementation supports Spain quote generation through a single API
    endpoint.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Quotes
    description: Quote generation operations
paths:
  /api/v1/quotes/generate:
    post:
      tags:
        - Quotes
      operationId: generateSpainQuote
      summary: Generate a quote for the Spain target flow
      description: >
        Validates the request, calculates pricing, persists the generated quote,
        and returns the quote identifier, pricing breakdown, and audit message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
            examples:
              standardHealthQuote:
                summary: Sample Spain quote request
                value:
                  customerId: CUST-1001
                  age: 37
                  policyType: HEALTH
                  countryCode: ES
                  coverageAmount: 50000
                  customerSegment: STANDARD
                  paymentFrequency: MONTHLY
                  gdprConsentGranted: true
      responses:
        '200':
          description: Quote generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
              examples:
                success:
                  summary: Successful quote response
                  value:
                    quoteId: QT-ES-2026-0001
                    pricing:
                      basePremium: 1200
                      riskFactor: 1.08
                      discountAmount: 45
                      taxAmount: 72
                      countryAdjustmentAmount: 31.1
                      finalPremium: 1354.1
                    auditMessage: Quote generated and persisted successfully for Spain.
        '400':
          description: Validation failure or malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingConsent:
                  summary: GDPR consent missing
                  value:
                    error: ValidationError
                    message: GDPR consent is required before quote generation.
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unexpectedError:
                  summary: Internal server error
                  value:
                    error: InternalServerError
                    message: An unexpected error occurred during quote generation.
components:
  schemas:
    QuoteRequest:
      type: object
      additionalProperties: false
      required:
        - customerId
        - age
        - policyType
        - countryCode
        - coverageAmount
        - customerSegment
        - paymentFrequency
        - gdprConsentGranted
      properties:
        customerId:
          type: string
          description: Customer identifier used to generate and persist the quote.
          example: CUST-1001
        age:
          type: integer
          minimum: 18
          description: Customer age used in validation and pricing logic.
          example: 37
        policyType:
          type: string
          enum:
            - HEALTH
            - TRAVEL
            - FAMILY
            - CORPORATE
          description: Insurance product type requested by the customer.
        countryCode:
          type: string
          enum:
            - ES
          description: Supported country code for the current target sample.
        coverageAmount:
          type: number
          format: double
          minimum: 0
          description: Requested policy coverage amount.
          example: 50000
        customerSegment:
          type: string
          enum:
            - STANDARD
            - LOYALTY_GOLD
            - EMPLOYEE
          description: Customer segment used for discount and business-rule evaluation.
        paymentFrequency:
          type: string
          enum:
            - MONTHLY
            - QUARTERLY
            - ANNUAL
          description: Requested payment frequency for the quote.
        gdprConsentGranted:
          type: boolean
          description: Indicates whether GDPR consent was provided.
          example: true
    QuoteResponse:
      type: object
      additionalProperties: false
      required:
        - quoteId
        - pricing
        - auditMessage
      properties:
        quoteId:
          type: string
          description: Generated quote identifier.
          example: QT-ES-2026-0001
        pricing:
          $ref: '#/components/schemas/PricingBreakdown'
        auditMessage:
          type: string
          description: Audit or persistence confirmation returned by the workflow.
          example: Quote generated and persisted successfully for Spain.
    PricingBreakdown:
      type: object
      additionalProperties: false
      required:
        - basePremium
        - riskFactor
        - discountAmount
        - taxAmount
        - countryAdjustmentAmount
        - finalPremium
      properties:
        basePremium:
          type: number
          format: double
          example: 1200
        riskFactor:
          type: number
          format: double
          example: 1.08
        discountAmount:
          type: number
          format: double
          example: 45
        taxAmount:
          type: number
          format: double
          example: 72
        countryAdjustmentAmount:
          type: number
          format: double
          example: 31.1
        finalPremium:
          type: number
          format: double
          example: 1354.1
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: ValidationError
        message:
          type: string
          example: GDPR consent is required before quote generation.
